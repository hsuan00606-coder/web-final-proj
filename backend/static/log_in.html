<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歐趴書局 - 會員登入</title>
  <link rel="stylesheet" href="common.css">
  <style>
    body {
      justify-content: flex-start; /* 讓 header 在頂端 */
    }

    .main-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }

    .auth-card {
      background-color: #fcd5b5;
      border-radius: 35px;
      width: 100%;
      max-width: 480px;
      padding: 50px 45px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
    }

    .auth-card h2 {
      font-size: 1.7rem;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 30px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group input {
      width: 100%;
      padding: 16px 22px;
      border: none;
      border-radius: 25px;
      font-size: 1rem;
      outline: none;
      background-color: white;
      color: #2c3e50;
    }

    .input-group input:focus {
      box-shadow: 0 0 0 3px rgba(230,126,34,0.25);
    }

    .auth-actions {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 28px;
    }

    .btn-submit {
      background-color: #e67e22;
      color: white;
      padding: 16px;
      border-radius: 25px;
      font-size: 1.1rem;
      font-weight: bold;
      width: 100%;
    }

    .btn-submit:hover { filter: brightness(1.1); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-link {
      background: none;
      color: #2c3e50;
      font-size: 0.95rem;
      text-decoration: underline;
      padding: 5px;
    }

    /* 倒數 overlay */
    .countdown-mask {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: #fcd5b5;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .countdown-content { text-align: center; }

    .timer-num {
      font-size: 4rem;
      font-weight: bold;
      color: #e67e22;
      margin-top: 15px;
    }

    .loading-spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(0,0,0,0.1);
      border-left-color: #e67e22;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    .error-msg {
      background-color: #ffe0e0;
      color: #c0392b;
      padding: 10px 18px;
      border-radius: 15px;
      font-size: 0.9rem;
      display: none;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="main-container">
    <div class="auth-card">

      <!-- 登入視圖 -->
      <div id="view-login">
        <h2>會員登入</h2>
        <div class="error-msg" id="login-error"></div>
        <form onsubmit="handleLogin(event)">
          <div class="input-group">
            <input type="text" id="login-username" placeholder="使用者帳號" required autocomplete="username">
          </div>
          <div class="input-group">
            <input type="password" id="login-password" placeholder="使用者密碼" required autocomplete="current-password">
          </div>
          <div class="auth-actions">
            <button type="submit" class="btn-submit" id="btn-login">登入</button>
            <button type="button" class="btn-link" onclick="switchView('register')">還沒有帳號？立即註冊</button>
          </div>
        </form>
      </div>

      <!-- 註冊視圖 -->
      <div id="view-register" style="display:none">
        <h2>會員註冊</h2>
        <div class="error-msg" id="reg-error"></div>
        <form onsubmit="handleRegister(event)">
          <div class="input-group">
            <input type="text" id="reg-username" placeholder="設定使用者帳號" required autocomplete="username">
          </div>
          <div class="input-group">
            <input type="email" id="reg-email" placeholder="電子郵件 (Email)" required autocomplete="email">
          </div>
          <div class="input-group">
            <input type="password" id="reg-password" placeholder="設定安全密碼" required autocomplete="new-password">
          </div>
          <div class="auth-actions">
            <button type="submit" class="btn-submit" id="btn-reg">提交註冊</button>
            <button type="button" class="btn-link" onclick="switchView('login')">已有帳號？返回登入</button>
          </div>
        </form>
      </div>

      <!-- 倒數 overlay -->
      <div id="countdown-overlay" class="countdown-mask" style="display:none">
        <div class="countdown-content">
          <div class="loading-spinner"></div>
          <h3 id="count-title">驗證成功！</h3>
          <p id="count-sub" style="color:#7f8c8d;margin-top:8px">即將跳轉至首頁...</p>
          <div class="timer-num" id="count-num">3</div>
        </div>
      </div>

    </div>
  </main>

  <div id="toast"></div>
  <script src="common.js"></script>
  <script>
    // 若已登入直接跳轉
    if (Auth.isLoggedIn()) location.href = "/index.html";

    initHeader({ activePage: "login", showSearch: false });

    function switchView(view) {
      document.getElementById("view-login").style.display    = view === "login"    ? "block" : "none";
      document.getElementById("view-register").style.display = view === "register" ? "block" : "none";
      // 清除錯誤訊息
      ["login-error", "reg-error"].forEach(id => {
        const el = document.getElementById(id);
        el.style.display = "none"; el.textContent = "";
      });
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = "block";
    }

    async function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById("login-username").value.trim();
      const password = document.getElementById("login-password").value;
      const btn = document.getElementById("btn-login");

      btn.disabled = true; btn.textContent = "登入中...";
      try {
        const result = await apiFetch("/auth/login", {
          method: "POST",
          body: JSON.stringify({ username, password }),
        });
        Auth.save(result.token, result.username);
        startCountdown("登入成功！", "正在跳轉至首頁...");
      } catch (err) {
        showError("login-error", err.message);
        btn.disabled = false; btn.textContent = "登入";
      }
    }

    async function handleRegister(event) {
      event.preventDefault();
      const username = document.getElementById("reg-username").value.trim();
      const email    = document.getElementById("reg-email").value.trim();
      const password = document.getElementById("reg-password").value;
      const btn = document.getElementById("btn-reg");

      btn.disabled = true; btn.textContent = "註冊中...";
      try {
        const result = await apiFetch("/auth/register", {
          method: "POST",
          body: JSON.stringify({ username, email, password }),
        });
        Auth.save(result.token, result.username);
        startCountdown("註冊驗證成功！", "正在安全登入並跳轉，請稍候...");
      } catch (err) {
        showError("reg-error", err.message);
        btn.disabled = false; btn.textContent = "提交註冊";
      }
    }

    function startCountdown(title, sub) {
      const overlay  = document.getElementById("countdown-overlay");
      const numEl    = document.getElementById("count-num");
      document.getElementById("count-title").textContent = title;
      document.getElementById("count-sub").textContent   = sub;
      overlay.style.display = "flex";

      let n = 3;
      numEl.textContent = n;
      const t = setInterval(() => {
        n--;
        numEl.textContent = n;
        if (n <= 0) { clearInterval(t); location.href = "/index.html"; }
      }, 1000);
    }
  </script>
</body>
</html>
