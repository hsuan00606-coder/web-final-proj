<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>歐趴書局 - 會員中心</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 60px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2980b9; color: white; border: none; cursor: pointer; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <h2 id="form-title">會員登入</h2>
    
    <div class="form-group" id="name-group" style="display: none;">
        <label>姓名</label>
        <input type="text" id="name" placeholder="請輸入姓名">
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="例如：buyer@test.edu.tw">
    </div>
    <div class="form-group">
        <label>密碼</label>
        <input type="password" id="password" placeholder="請輸入密碼">
    </div>

    <button id="submit-btn">登入</button>
    <div class="toggle-link">
        <a href="#" id="toggle-auth">還沒有帳號？切換至註冊</a>
    </div>

    <script>
        let isLoginMode = true;

        // 切換登入與註冊介面
        document.getElementById('toggle-auth').addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            document.getElementById('form-title').innerText = isLoginMode ? "會員登入" : "會員註冊";
            document.getElementById('submit-btn').innerText = isLoginMode ? "登入" : "註冊";
            document.getElementById('name-group').style.display = isLoginMode ? "none" : "block";
            e.target.innerText = isLoginMode ? "還沒有帳號？切換至註冊" : "已有帳號？切換至登入";
        });

        // 處理按鈕提交功能
        document.getElementById('submit-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const name = document.getElementById('name').value.trim();

            if(!email || !password) { alert("請填寫必填欄位！"); return; }

            if (isLoginMode) {
                // 處理登入通訊
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                if(res.ok) {
                    const data = await res.json();
                    localStorage.setItem('user', JSON.stringify(data.user));
                    alert("登入成功！");
                    window.location.href = 'index.html';
                } else {
                    alert("登入失敗，請檢查帳密");
                }
            } else {
                // 處理註冊通訊 (Spec 規範：毫秒級即時跳轉)
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name: name || "未命名" })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    // 收到後不進行不必要的延遲，毫秒級跳轉至登入模式
                    alert("註冊成功！已為您即時引導至登入畫面。");
                    window.location.reload(); 
                } else {
                    alert("註冊失敗：" + data.detail);
                }
            }
        });
    </script>
</body>
</html>
